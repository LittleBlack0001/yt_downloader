<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yt-red: #ff0000;
            --yt-red-hover: #cc0000;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --bg-body: #f9f9f9;
            --bg-card: #ffffff;
            --border-color: #e5e5e5;
        }

        body { 
            font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            padding: 5vh 20px; 
            margin: 0; 
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
        }

        /* Logo 區塊設計 */
    .header-logo {
       text-align: center;
       margin-bottom: 35px; /* 稍微增加一點下方的留白，讓大 Logo 不會太壓迫卡片 */
    }
    .header-logo img {
    max-width: 420px; /* 👈 從原本的 280px 大幅放大到 420px */
    width: 90%;       /* 👈 加入這個設定，確保如果用手機等小螢幕開啟時，Logo 不會破版 */
    height: auto;
    mix-blend-mode: multiply; 
    }

        /* 卡片立體感升級 */
        .card { 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); 
            margin-bottom: 25px; 
            border: 1px solid rgba(0,0,0,0.03);
        }

        h3 { 
            margin-top: 0; 
            font-size: 18px; 
            color: var(--text-main); 
            border-bottom: 2px solid var(--bg-body);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            font-size: 14px;
            color: var(--text-muted); 
        }

        /* 輸入框與選單的現代化交互 */
        input[type="text"], select { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, select:focus { 
            border-color: var(--yt-red); 
            box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.1); 
            outline: none; 
            background-color: var(--bg-card);
        }
        
        /* 按鈕視覺強化 */
        button { 
            width: 100%; 
            background-color: var(--yt-red); 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: 700; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            margin-top: 5px;
        }
        button:hover { 
            background-color: var(--yt-red-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 0, 0, 0.2);
        }
        button:disabled { 
            background-color: #cccccc; 
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }
        
        .hidden { display: none !important; }

        /* 影片資訊標籤 */
        .video-info-box { 
            background: var(--bg-body); 
            padding: 16px; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            font-size: 15px; 
            word-break: break-all; 
            border-left: 5px solid var(--yt-red); 
            line-height: 1.5;
        }

        /* 進度條設計 */
        .progress-bar-bg { 
            width: 100%; 
            background-color: var(--bg-body); 
            border-radius: 8px; 
            height: 12px; 
            overflow: hidden; 
            margin-top: 25px; 
            border: 1px solid var(--border-color);
        }
        .progress-bar-fill { 
            height: 100%; 
            width: 0%; 
            background-color: var(--yt-red); 
            transition: width 0.4s ease-out; 
        }
        #status-text { 
            font-size: 14px; 
            text-align: center; 
            margin-top: 12px; 
            color: var(--text-muted); 
            font-weight: 500;
        }
        .loading-text { 
            color: var(--text-muted); 
            font-weight: 500; 
            text-align: center; 
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="YouTube Downloader Logo">
    </div>
    
    <div class="card">
        <div class="form-group">
            <label>貼上影音連結</label>
            <input type="text" id="url" placeholder="https://www.youtube.com/...">
        </div>
        <button id="analyze-btn" onclick="analyzeVideo()">獲取影音資訊</button>
        <p id="analyze-status" class="loading-text hidden"></p>
    </div>

    <div id="download-card" class="card hidden">
        <h3>下載設定</h3>
        
        <div id="mode-group" class="form-group hidden">
            <label>下載模式</label>
            <select id="mode-select" onchange="toggleMode()">
                <option value="single">下載當前單一影片</option>
                <option value="playlist">打包下載完整播放清單</option>
            </select>
        </div>

        <div class="video-info-box" id="video-title"></div>
        
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>影片畫質</label>
                <select id="quality-select"></select>
            </div>
            
            <div class="form-group" style="flex: 1;">
                <label>音訊品質</label>
                <select id="audio-select"></select>
            </div>
        </div>

        <button id="download-btn" onclick="startDownload()">立即下載</button>

        <div id="progress-area" class="hidden">
            <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
            <div id="status-text">準備下載...</div>
        </div>
    </div>
</div>

<script>
    let currentUrl = "";
    window.cachedVideoData = null; 

    async function analyzeVideo() {
        const urlInput = document.getElementById('url').value.trim();
        const analyzeBtn = document.getElementById('analyze-btn');
        const analyzeStatus = document.getElementById('analyze-status');
        const downloadCard = document.getElementById('download-card');
        const modeGroup = document.getElementById('mode-group');
        const modeSelect = document.getElementById('mode-select');

        if (!urlInput) {
            alert("請先貼上 YouTube 連結");
            return;
        }

        currentUrl = urlInput;
        analyzeBtn.disabled = true;
        analyzeStatus.innerText = "正在解析連結，請稍候...";
        analyzeStatus.classList.remove('hidden');
        downloadCard.classList.add('hidden');
        modeGroup.classList.add('hidden'); 

        try {
            const response = await fetch('/api/get_info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: currentUrl })
            });
            const data = await response.json();

            if (data.success) {
                analyzeStatus.classList.add('hidden');
                window.cachedVideoData = data; 
                
                if (data.is_playlist && data.single_video_info) {
                    modeGroup.classList.remove('hidden');
                    const lengthText = data.playlist_info.length > 0 ? `(共 ${data.playlist_info.length} 首)` : ``;
                    
                    modeSelect.innerHTML = `
                        <option value="single">下載當前單一影片</option>
                        <option value="playlist">打包下載完整播放清單 ${lengthText}</option>
                    `;
                    modeSelect.value = "single";
                    renderOptions(data.single_video_info, data.single_video_info.title, "影片");
                    
                } else if (data.is_playlist && !data.single_video_info) {
                    modeGroup.classList.remove('hidden');
                    const lengthText = data.playlist_info.length > 0 ? `(共 ${data.playlist_info.length} 首)` : ``;
                    
                    modeSelect.innerHTML = `<option value="playlist">打包下載完整播放清單 ${lengthText}</option>`;
                    modeSelect.value = "playlist";
                    renderOptions({
                        resolutions: ['1080p', '720p', '480p'],
                        audios: ['128kbps', '64kbps']
                    }, data.playlist_info.title, "播放清單");
                    
                } else if (data.single_video_info) {
                    modeSelect.value = "single";
                    renderOptions(data.single_video_info, data.single_video_info.title, "影片");
                }
            } else {
                analyzeStatus.innerText = "解析失敗：" + data.error;
                analyzeStatus.style.color = "var(--yt-red)";
            }
        } catch (err) {
            analyzeStatus.innerText = "伺服器連線異常，請確認後端是否運行。";
            analyzeStatus.style.color = "var(--yt-red)";
        } finally {
            analyzeBtn.disabled = false;
        }
    }

    function toggleMode() {
        const mode = document.getElementById('mode-select').value;
        const data = window.cachedVideoData;
        
        if (mode === 'playlist') {
            document.getElementById('video-title').innerHTML = `<strong style="color:var(--text-muted);">目標播放清單</strong><br>${data.playlist_info.title}`;
        } else {
            document.getElementById('video-title').innerHTML = `<strong style="color:var(--text-muted);">目標影片</strong><br>${data.single_video_info.title}`;
        }
    }

    function renderOptions(info, titleText, typeLabel) {
        document.getElementById('video-title').innerHTML = `<strong style="color:var(--text-muted);">目標${typeLabel}</strong><br>${titleText}`;
        
        const qSelect = document.getElementById('quality-select');
        qSelect.innerHTML = info.resolutions.map(res => `<option value="${res}">${res}</option>`).join('');

        const aSelect = document.getElementById('audio-select');
        aSelect.innerHTML = info.audios.map(aud => `<option value="${aud}">${aud}</option>`).join('');

        setDefaultSelect(qSelect, '1080p');
        setDefaultSelect(aSelect, '128kbps');

        document.getElementById('download-card').classList.remove('hidden');
    }

    function setDefaultSelect(selectElement, targetValue) {
        for (let i = 0; i < selectElement.options.length; i++) {
            if (selectElement.options[i].value.includes(targetValue)) {
                selectElement.selectedIndex = i;
                return;
            }
        }
        if (selectElement.options.length > 0) {
            selectElement.selectedIndex = 0;
        }
    }

    function startDownload() {
        const quality = document.getElementById('quality-select').value;
        const audio = document.getElementById('audio-select').value;
        const modeStr = document.getElementById('mode-select') ? document.getElementById('mode-select').value : 'single';
        
        const downloadBtn = document.getElementById('download-btn');
        const progressArea = document.getElementById('progress-area');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');

        downloadBtn.disabled = true;
        document.getElementById('analyze-btn').disabled = true;
        progressArea.classList.remove('hidden');
        progressFill.style.width = "0%";
        statusText.innerText = "正在初始化下載程序...";

        let targetUrl = currentUrl;
        if (modeStr === 'playlist' && window.cachedVideoData && window.cachedVideoData.playlist_info) {
            targetUrl = window.cachedVideoData.playlist_info.url; 
        }

        const encodedUrl = encodeURIComponent(targetUrl);
        const sseUrl = `/api/download_stream?url=${encodedUrl}&res=${quality}&audio=${audio}&mode=${modeStr}`;
        const eventSource = new EventSource(sseUrl);

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // 更新進度條寬度
            progressFill.style.width = data.progress + "%";
            // 更新文字狀態，後端現在會回傳帶有 % 的精確訊息
            statusText.innerText = data.msg;

            if (data.status === 'complete') {
                eventSource.close();
                statusText.innerText = "處理完成！若未跳出視窗，請檢查瀏覽器設定。 (100%)";
                
                const fetchUrl = `/api/fetch_file?task_id=${data.task_id}&filename=${encodeURIComponent(data.filename)}&is_zip=${data.is_zip}`;
                
                // 使用隱藏的 <a> 標籤來觸發下載，這比單純跳轉網址更標準
                const a = document.createElement('a');
                a.href = fetchUrl;
                a.download = data.filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                downloadBtn.disabled = false;
                document.getElementById('analyze-btn').disabled = false;
            } 
            else if (data.status === 'error') {
                eventSource.close();
                statusText.innerText = data.msg;
                statusText.style.color = "var(--yt-red)";
                downloadBtn.disabled = false;
                document.getElementById('analyze-btn').disabled = false;
            }
        };
    }
</script>

</body>
</html>
